<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planner - Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #5b86e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 15px 25px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 0.9em;
            color: #b0b0b0;
            margin-top: 5px;
        }

        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .filter-group select:hover,
        .filter-group select:focus,
        .filter-group input:hover,
        .filter-group input:focus {
            border-color: #00d4ff;
            outline: none;
            background: rgba(0, 0, 0, 0.5);
        }

        .filter-group select option {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .results-count {
            color: #00d4ff;
            font-size: 1.1em;
        }

        .routes-container {
            display: grid;
            gap: 25px;
        }

        .route-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .route-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .route-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }

        .route-title {
            font-size: 1.3em;
            color: #00d4ff;
            font-weight: 600;
        }

        .route-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-badge {
            padding: 6px 12px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            font-size: 0.85em;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .route-segments {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .segment {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border-left: 3px solid #00d4ff;
            transition: all 0.2s ease;
        }

        .segment:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateX(5px);
        }

        .segment-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .segment-route {
            flex: 1;
            min-width: 250px;
        }

        .segment-location {
            font-weight: 600;
            color: #e0e0e0;
        }

        .segment-arrow {
            margin: 0 15px;
            color: #00d4ff;
            font-size: 1.2em;
        }

        .segment-time {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #b0b0b0;
        }

        .time-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .time-label {
            color: #888;
        }

        .countries-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .countries-label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 8px;
        }

        .countries-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .country-tag {
            padding: 4px 10px;
            background: rgba(91, 134, 229, 0.2);
            border-radius: 15px;
            font-size: 0.8em;
            border: 1px solid rgba(91, 134, 229, 0.4);
        }

        .load-more-btn {
            margin: 30px auto;
            display: block;
            padding: 15px 40px;
            background: linear-gradient(90deg, #00d4ff, #5b86e5);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .load-more-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
            font-size: 1.2em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading::after {
            content: '...';
            animation: pulse 1.5s infinite;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Route Planner Explorer</h1>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-routes">-</div>
                    <div class="stat-label">Total Routes</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="max-countries">-</div>
                    <div class="stat-label">Max Countries</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="nodes-explored">-</div>
                    <div class="stat-label">Nodes Explored</div>
                </div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label for="country-filter">Number of Countries</label>
                <select id="country-filter">
                    <option value="">All Countries</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="start-node-filter">Starting Node</label>
                <select id="start-node-filter">
                    <option value="">All Starting Nodes</option>
                </select>
            </div>
        </div>

        <div class="results-header">
            <div class="results-count" id="results-count">Loading...</div>
        </div>

        <div id="loading" class="loading">Loading data</div>
        <div id="no-results" class="no-results hidden">No routes found matching your filters</div>
        <div id="routes-container" class="routes-container"></div>
        <button id="load-more-btn" class="load-more-btn hidden">Load More Routes</button>
    </div>

    <script>
        let allRoutes = [];
        let filteredRoutes = [];
        let displayedCount = 0;
        const INITIAL_DISPLAY = 5;
        const LOAD_MORE_COUNT = 5;

        // Load JSON data
        async function loadData() {
            try {
                let response;
                try {
                    response = await fetch('results/live_checkpoint.json');
                } catch (e) {
                    // If fetch fails (CORS/local file), wait for file upload
                    document.getElementById('loading').innerHTML = 
                        'Please load the JSON file using the file input above, or serve this page via a local server.';
                    return;
                }
                
                if (!response.ok) {
                    document.getElementById('loading').innerHTML = 
                        'Could not load live_checkpoint.json. Please use the file input above.';
                    return;
                }
                
                const data = await response.json();
                
                // Update stats
                document.getElementById('max-countries').textContent = data.global_max || 'N/A';
                document.getElementById('nodes-explored').textContent = 
                    data.nodes_explored ? data.nodes_explored.toLocaleString() : 'N/A';

                // Process routes
                allRoutes = [];
                const countryCounts = new Set();
                const startNodes = new Set();

                for (const [countryCountStr, routes] of Object.entries(data.routes || {})) {
                    const countryCount = parseInt(countryCountStr);
                    countryCounts.add(countryCount);
                    
                    for (const route of routes) {
                        if (route && route.length > 0) {
                            const uniqueCountries = getUniqueCountries(route);
                            const startNode = route[0].origin;
                            startNodes.add(startNode);
                            
                            allRoutes.push({
                                route: route,
                                countryCount: uniqueCountries.size,
                                countries: Array.from(uniqueCountries),
                                startNode: startNode,
                                segments: route.length
                            });
                        }
                    }
                }

                // Sort routes by country count (descending), then by segments
                allRoutes.sort((a, b) => {
                    if (b.countryCount !== a.countryCount) {
                        return b.countryCount - a.countryCount;
                    }
                    return b.segments - a.segments;
                });

                // Populate filters
                populateCountryFilter(Array.from(countryCounts).sort((a, b) => b - a));
                populateStartNodeFilter(Array.from(startNodes).sort());

                document.getElementById('total-routes').textContent = allRoutes.length.toLocaleString();
                
                document.getElementById('loading').classList.add('hidden');
                applyFilters();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').textContent = 'Error loading data. Make sure live_checkpoint.json is in the results folder.';
            }
        }

        function getUniqueCountries(route) {
            const countries = new Set();
            const countryRegex = /\(([^)]+)\)/;
            
            for (const segment of route) {
                const originMatch = segment.origin.match(countryRegex);
                const destMatch = segment.dest.match(countryRegex);
                
                if (originMatch) countries.add(originMatch[1]);
                if (destMatch) countries.add(destMatch[1]);
            }
            
            return countries;
        }

        function populateCountryFilter(countryCounts) {
            const select = document.getElementById('country-filter');
            countryCounts.forEach(count => {
                const option = document.createElement('option');
                option.value = count;
                option.textContent = `${count} ${count === 1 ? 'Country' : 'Countries'}`;
                select.appendChild(option);
            });
        }

        function populateStartNodeFilter(startNodes) {
            const select = document.getElementById('start-node-filter');
            startNodes.forEach(node => {
                const option = document.createElement('option');
                option.value = node;
                option.textContent = node;
                select.appendChild(option);
            });
        }

        function applyFilters() {
            const countryFilter = document.getElementById('country-filter').value;
            const startNodeFilter = document.getElementById('start-node-filter').value;

            filteredRoutes = allRoutes.filter(route => {
                if (countryFilter && route.countryCount !== parseInt(countryFilter)) {
                    return false;
                }
                if (startNodeFilter && route.startNode !== startNodeFilter) {
                    return false;
                }
                return true;
            });

            displayedCount = 0;
            displayRoutes();
        }

        function formatTime(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
        }

        function displayRoutes() {
            const container = document.getElementById('routes-container');
            const loadMoreBtn = document.getElementById('load-more-btn');
            const noResults = document.getElementById('no-results');
            const resultsCount = document.getElementById('results-count');

            resultsCount.textContent = `Showing ${Math.min(displayedCount, filteredRoutes.length)} of ${filteredRoutes.length} routes`;

            if (filteredRoutes.length === 0) {
                container.innerHTML = '';
                loadMoreBtn.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');

            const toDisplay = Math.min(displayedCount + INITIAL_DISPLAY, filteredRoutes.length);
            
            for (let i = displayedCount; i < toDisplay; i++) {
                const routeData = filteredRoutes[i];
                const routeCard = createRouteCard(routeData, i + 1);
                container.appendChild(routeCard);
            }

            displayedCount = toDisplay;

            if (displayedCount < filteredRoutes.length) {
                loadMoreBtn.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        function createRouteCard(routeData, index) {
            const card = document.createElement('div');
            card.className = 'route-card';

            const header = document.createElement('div');
            header.className = 'route-header';

            const title = document.createElement('div');
            title.className = 'route-title';
            title.textContent = `Route #${index}`;

            const meta = document.createElement('div');
            meta.className = 'route-meta';
            
            const countryBadge = document.createElement('span');
            countryBadge.className = 'meta-badge';
            countryBadge.textContent = `${routeData.countryCount} Countries`;
            
            const segmentsBadge = document.createElement('span');
            segmentsBadge.className = 'meta-badge';
            segmentsBadge.textContent = `${routeData.segments} Segments`;

            meta.appendChild(countryBadge);
            meta.appendChild(segmentsBadge);
            header.appendChild(title);
            header.appendChild(meta);

            const segmentsContainer = document.createElement('div');
            segmentsContainer.className = 'route-segments';

            routeData.route.forEach((segment, idx) => {
                const segmentDiv = document.createElement('div');
                segmentDiv.className = 'segment';

                const segmentInfo = document.createElement('div');
                segmentInfo.className = 'segment-info';

                const routeDiv = document.createElement('div');
                routeDiv.className = 'segment-route';
                
                const origin = document.createElement('span');
                origin.className = 'segment-location';
                origin.textContent = segment.origin;
                
                const arrow = document.createElement('span');
                arrow.className = 'segment-arrow';
                arrow.textContent = '→';
                
                const dest = document.createElement('span');
                dest.className = 'segment-location';
                dest.textContent = segment.dest;

                routeDiv.appendChild(origin);
                routeDiv.appendChild(arrow);
                routeDiv.appendChild(dest);

                const timeDiv = document.createElement('div');
                timeDiv.className = 'segment-time';
                
                const depTime = document.createElement('div');
                depTime.className = 'time-item';
                depTime.innerHTML = `<span class="time-label">Dep:</span> <strong>${formatTime(segment.dep_time)}</strong>`;
                
                const arrTime = document.createElement('div');
                arrTime.className = 'time-item';
                arrTime.innerHTML = `<span class="time-label">Arr:</span> <strong>${formatTime(segment.arr_time)}</strong>`;

                timeDiv.appendChild(depTime);
                timeDiv.appendChild(arrTime);

                segmentInfo.appendChild(routeDiv);
                segmentInfo.appendChild(timeDiv);
                segmentDiv.appendChild(segmentInfo);
                segmentsContainer.appendChild(segmentDiv);
            });

            const countriesDiv = document.createElement('div');
            countriesDiv.className = 'countries-list';
            
            const countriesLabel = document.createElement('div');
            countriesLabel.className = 'countries-label';
            countriesLabel.textContent = 'Countries Visited:';
            
            const countriesTags = document.createElement('div');
            countriesTags.className = 'countries-tags';
            
            routeData.countries.sort().forEach(country => {
                const tag = document.createElement('span');
                tag.className = 'country-tag';
                tag.textContent = country;
                countriesTags.appendChild(tag);
            });

            countriesDiv.appendChild(countriesLabel);
            countriesDiv.appendChild(countriesTags);

            card.appendChild(header);
            card.appendChild(segmentsContainer);
            card.appendChild(countriesDiv);

            return card;
        }

        function processData(data) {
            // Process routes first to calculate actual max
            allRoutes = [];
            const countryCounts = new Set();
            const startNodes = new Set();

            for (const [countryCountStr, routes] of Object.entries(data.routes || {})) {
                for (const route of routes) {
                    if (route && route.length > 0) {
                        const uniqueCountries = getUniqueCountries(route);
                        const actualCountryCount = uniqueCountries.size;
                        const startNode = route[0].origin;
                        
                        countryCounts.add(actualCountryCount);
                        startNodes.add(startNode);
                        
                        allRoutes.push({
                            route: route,
                            countryCount: actualCountryCount,
                            countries: Array.from(uniqueCountries),
                            startNode: startNode,
                            segments: route.length
                        });
                    }
                }
            }

            // Sort routes by country count (descending), then by segments
            allRoutes.sort((a, b) => {
                if (b.countryCount !== a.countryCount) {
                    return b.countryCount - a.countryCount;
                }
                return b.segments - a.segments;
            });

            // Calculate actual max countries from processed routes
            const actualMaxCountries = allRoutes.length > 0 
                ? Math.max(...allRoutes.map(r => r.countryCount))
                : (data.global_max || 'N/A');

            // Update stats
            document.getElementById('max-countries').textContent = actualMaxCountries;
            document.getElementById('nodes-explored').textContent = 
                data.nodes_explored ? data.nodes_explored.toLocaleString() : 'N/A';

            // Populate filters
            populateCountryFilter(Array.from(countryCounts).sort((a, b) => b - a));
            populateStartNodeFilter(Array.from(startNodes).sort());

            document.getElementById('total-routes').textContent = allRoutes.length.toLocaleString();
            
            document.getElementById('loading').classList.add('hidden');
            applyFilters();
        }

        // Load JSON data
        async function loadData() {
            try {
                const response = await fetch('results/live_checkpoint.json');
                
                if (!response.ok) {
                    document.getElementById('loading').innerHTML = 
                        'Could not load live_checkpoint.json. Make sure the file exists in the results folder.';
                    return;
                }
                
                const data = await response.json();
                processData(data);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').textContent = 
                    'Error loading data. Make sure you are serving this page via a local server (e.g., using serve_visualizer.py).';
            }
        }

        // Event listeners
        document.getElementById('country-filter').addEventListener('change', () => {
            document.getElementById('routes-container').innerHTML = '';
            applyFilters();
        });

        document.getElementById('start-node-filter').addEventListener('change', () => {
            document.getElementById('routes-container').innerHTML = '';
            applyFilters();
        });

        document.getElementById('load-more-btn').addEventListener('click', () => {
            displayRoutes();
        });

        // Load data on page load
        loadData();
    </script>
</body>
</html>
